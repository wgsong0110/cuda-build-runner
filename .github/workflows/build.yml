name: Build CUDA extensions

on:
  repository_dispatch:
    types: [cuda-build]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.find.outputs.libs }}
      target_repo: ${{ github.event.client_payload.repo }}
      target_ref: ${{ github.event.client_payload.ref }}
      target_sha: ${{ github.event.client_payload.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.ref }}
          token: ${{ secrets.REPO_PAT }}

      - id: find
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
          TARGET_REPO: ${{ github.event.client_payload.repo }}
        run: |
          PREFIX=$(jq -r '.cuda_build.release_tag // "cuda-build"' .wexec.json 2>/dev/null || echo "cuda-build")

          LIBS='[]'
          for setup_py in $(find . -name 'setup.py' -not -path './.git/*' | sort); do
            lib_dir=$(dirname "$setup_py")
            cuda_files=$(find "$lib_dir" \( -name '*.cu' -o -name '*.cuh' \) | sort)
            [ -z "$cuda_files" ] && continue
            lib_name=$(basename "$lib_dir")
            lib_hash=$(echo "$cuda_files" | xargs sha256sum | sha256sum | cut -c1-7)
            tag="${PREFIX}-${lib_name}-${lib_hash}"

            if gh release view "$tag" --repo "$TARGET_REPO" &>/dev/null; then
              echo "SKIP $lib_name: $tag exists"
              continue
            fi

            echo "BUILD $lib_name: $tag"
            LIBS=$(echo "$LIBS" | jq -c --arg name "$lib_name" --arg dir "$lib_dir" --arg hash "$lib_hash" \
              '. + [{"name":$name,"dir":$dir,"hash":$hash}]')
          done

          echo "libs=$LIBS" >> "$GITHUB_OUTPUT"
          echo "Libraries to build: $(echo "$LIBS" | jq length)"

  build:
    needs: detect
    if: needs.detect.outputs.libs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lib: ${{ fromJson(needs.detect.outputs.libs) }}
      fail-fast: false
    container:
      image: ghcr.io/wgsong0110/build:latest
      env:
        CUDA_HOME: /usr/local/cuda
        TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9;9.0"

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ needs.detect.outputs.target_repo }}
          ref: ${{ needs.detect.outputs.target_ref }}
          token: ${{ secrets.REPO_PAT }}

      - name: Build ${{ matrix.lib.name }}
        run: |
          export CUDA_HOME=/usr/local/cuda
          export TORCH_CUDA_ARCH_LIST="7.0;7.5;8.0;8.6;8.9;9.0"
          cd "${{ matrix.lib.dir }}" && python setup.py build_ext --inplace

      - name: Release ${{ matrix.lib.name }}
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
          TARGET_REPO: ${{ needs.detect.outputs.target_repo }}
          TARGET_SHA: ${{ needs.detect.outputs.target_sha }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          PREFIX=$(jq -r '.cuda_build.release_tag // "cuda-build"' .wexec.json 2>/dev/null || echo "cuda-build")
          TAG="${PREFIX}-${{ matrix.lib.name }}-${{ matrix.lib.hash }}"
          LIB_DIR="${{ matrix.lib.dir }}"

          so_files=$(find "$LIB_DIR" -name '*.so' \
            -not -path '*/build/*' \
            -not -path '*/__pycache__/*')

          if [ -z "$so_files" ]; then
            echo "ERROR: no .so files found after build"
            exit 1
          fi

          echo "$so_files" > /tmp/so_list.txt
          tar czf "/tmp/${{ matrix.lib.name }}.tar.gz" -T /tmp/so_list.txt
          echo "Archive: $(du -h /tmp/${{ matrix.lib.name }}.tar.gz | cut -f1)"

          gh release create "$TAG" \
            "/tmp/${{ matrix.lib.name }}.tar.gz" \
            --repo "$TARGET_REPO" \
            --title "CUDA: ${{ matrix.lib.name }} (${{ matrix.lib.hash }})" \
            --notes "Auto-built from commit $TARGET_SHA" \
            --latest=false
          echo "Released: $TAG"
