name: Build build image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo docker image prune -af

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          gh api repos/wgsong0110/session-web/contents/Dockerfile.build \
            -q '.content' | base64 -d > Dockerfile.build
          docker build -f Dockerfile.build \
            -t ghcr.io/wgsong0110/build:latest \
            .
          docker push ghcr.io/wgsong0110/build:latest
